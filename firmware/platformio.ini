[platformio]
default_envs = esp32-c3-devkitm-1

; AI clock firmware for ESP32-C3 and the original ESP8266 board.
; The ESP32-C3 environment is the default. Its pin map matches the 240x240
; C3 weather-display board schematic. Change only the TFT_* values when
; building for a different C3 board.

[env]
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.1
    bitbank2/AnimatedGIF@^2.2.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_2_DRIVER=1
    -D TFT_RGB_ORDER=TFT_RGB
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -I include
    -D WM_STRINGS_FILE='"wm_strings_zh.h"'

[env:esp32-c3-devkitm-1]
; Arduino-ESP32 2.0.17 in PlatformIO 6.7+ changed the ESP32-C3 REG_SPI_BASE
; contract and makes TFT_eSPI 2.5.43 dereference 0x10 during tft.init().
; 6.6.0 is the last PlatformIO release on the compatible Arduino 2.0.14 core.
platform = espressif32@6.6.0
board = esp32-c3-devkitm-1
upload_protocol = esptool

; Two large app slots are unnecessary because this project uses serial/Web
; Serial flashing, not Arduino OTA. no_ota.csv leaves room for both the app and
; uploaded LittleFS sprites on a 4MB module.
board_build.partitions = no_ota.csv
board_build.flash_mode = dio
board_build.f_flash = 40000000L

build_flags =
    ${env.build_flags}
    ; Do not embed the build machine's Home path in release firmware.
    -ffile-prefix-map=${sysenv.HOME}=.
    -fmacro-prefix-map=${sysenv.HOME}=.
    ; Route Serial through the C3's native USB Serial/JTAG connection.
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    ; C3 weather-display schematic: CS is not routed to the MCU, so the panel
    ; is treated as always selected. These values were recovered from the
    ; board's working factory firmware (TFT_eSPI SPI.begin + GPIO setup):
    ; ST7789 SCLK=3 MOSI=5 MISO=5 CS=none DC=2 RST=6 BL=1 (active LOW).
    ; The write-only panel has no MISO wire; matching MISO to MOSI is the
    ; factory/TFT_eSPI ESP32-C3 convention used only to initialise SPI.
    -D TFT_MOSI=5
    -D TFT_MISO=5
    -D TFT_SCLK=3
    -D TFT_CS=-1
    -D TFT_DC=2
    -D TFT_RST=6
    -D TFT_BL=1
    -D TFT_BACKLIGHT_ON=LOW

; Original SD2/MG01 ESP8266 target retained for upstream compatibility.
[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
upload_protocol = esptool

build_flags =
    ${env.build_flags}
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=0
    -D TFT_RST=2
    -D TFT_BL=5
    -D TFT_BACKLIGHT_ON=LOW
